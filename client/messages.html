<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | EditPro</title>
</head>
<body>

<header>
    <h1>Messages</h1>
</header>

<main>

    <!-- Chat List -->
    <aside>

        <h2>Chats</h2>

        <ul>
            <li>
                <strong>Editor A</strong><br>
                Last message: Project updated.
            </li>

            <li>
                <strong>Editor B</strong><br>
                Last message: Files uploaded.
            </li>
        </ul>

    </aside>

    <!-- Chat Window -->
    <section>

        <header>
            <h2>Editor A</h2>
            <p>🟢 Online</p>
        </header>

        <section>

            <article>
                <p><strong>Editor:</strong> Your project is 70% completed.</p>
            </article>

            <article>
                <p><strong>You:</strong> Great! Please share a preview.</p>
            </article>

        </section>

        <!-- Message Input -->
        <footer>

            <input type="text" placeholder="Type your message...">

            <input type="file">

            <button>Send</button>

        </footer>

    </section>

</main>


</body></html>
